name: iOS Build (unsigned)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Clean Flutter and iOS pod state
        run: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData/*

      - name: Install Dart/Flutter packages
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod deintegrate
          pod install --repo-update
          cd ..

      - name: Normalize gRPC modulemap path for Xcode
        run: |
          set -e
          MODULEMAP_SOURCE=$(find ios/Pods -name "gRPC-Core.modulemap" | head -n 1 || true)
          if [ -z "$MODULEMAP_SOURCE" ]; then
            echo "gRPC-Core.modulemap not found after pod install"
            exit 1
          fi
          mkdir -p ios/Pods/Headers/Private/grpc
          cp "$MODULEMAP_SOURCE" ios/Pods/Headers/Private/grpc/gRPC-Core.modulemap
          echo "gRPC-Core.modulemap normalized at ios/Pods/Headers/Private/grpc/gRPC-Core.modulemap"

      - name: Build iOS simulator app (no signing required)
        run: flutter build ios --simulator -v

      - name: Upload iOS build logs artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ios-build-output
          path: |
            build/ios/
            ios/Podfile.lock
