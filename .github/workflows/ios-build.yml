name: iOS Build (unsigned)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Install Dart/Flutter packages
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build iOS app without signing
        run: flutter build ios --no-codesign -v

      - name: Upload iOS build logs artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ios-build-output
          path: |
            build/ios/
            ios/Podfile.lock
